name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: webhook_user
          POSTGRES_PASSWORD: webhook_pass
          POSTGRES_DB: webhook_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U webhook_user -d webhook_pipeline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://webhook_user:webhook_pass@localhost:5432/webhook_pipeline
      REDIS_URL: redis://localhost:6379
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npm run migrate

      - name: Test
        run: npm test
