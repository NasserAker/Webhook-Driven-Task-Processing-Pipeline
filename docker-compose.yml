services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhook_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis (job queue) ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── Migration runner ────────────────────────────────────────────────────────
  # Runs once on startup, exits 0 when done. API + worker wait for it.
  migrate:
    build:
      context: .
      target: builder          # Use the builder stage so ts-node is available
    command: ["sh", "-lc", "npx ts-node src/db/migrate.ts"]
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@postgres:5432/webhook_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── API server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    command: ["node", "dist/index.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@postgres:5432/webhook_pipeline
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Background worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: production
    command: ["node", "dist/worker/index.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://webhook_user:webhook_pass@postgres:5432/webhook_pipeline
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data: